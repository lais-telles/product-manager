<h2 mat-dialog-title>
  {{ data ? 'Editar Produto' : 'Novo Produto' }}
</h2>

<div mat-dialog-content>

  <mat-form-field appearance="outline">
    <mat-label>Nome</mat-label>
    <input matInput [(ngModel)]="produto.nome">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>SKU</mat-label>
    <input matInput [(ngModel)]="produto.sku" [disabled]="data">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Categoria</mat-label>
    <mat-select [(ngModel)]="produto.categoria">
      <mat-option *ngFor="let c of categorias" [value]="c">
        {{ c }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Preço</mat-label>
    <input matInput type="number" [(ngModel)]="produto.preco" min="0">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Estoque</mat-label>
    <input matInput type="number" [(ngModel)]="produto.quantidadeEstoque" min="0">
  </mat-form-field>

</div>

<div mat-dialog-actions align="end">
  <button mat-button (click)="fechar()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="salvar()" [disabled]="!formValido()">
    Salvar
  </button>
</div>
